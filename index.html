<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clap Nitzan</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.2rem;
      color: #fff;
    }

    .headline {
      font-family: 'Inter', sans-serif;
      font-size: clamp(0.85rem, 2.5vw, 1rem);
      font-weight: 300;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 1.8rem;
      text-align: center;
    }

    /* COUNTDOWN */
    .countdown {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: clamp(0.4rem, 2vw, 1.2rem);
      margin-bottom: 4rem;
    }

    .unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
    }

    .digit {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(4rem, 16vw, 9rem);
      line-height: 1;
      color: #fff;
      letter-spacing: 0.02em;
      transition: color 0.1s;
    }

    .digit.tick { color: #f97316; }

    .unit-label {
      font-size: clamp(0.5rem, 1.5vw, 0.6rem);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #555;
    }

    .colon {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 12vw, 7rem);
      line-height: 1;
      color: #f97316;
      margin-top: 0.05em;
    }

    .done {
      text-align: center;
      font-size: 1.1rem;
      color: #f97316;
      letter-spacing: 0.1em;
      margin-bottom: 4rem;
    }

    /* DIVIDER */
    hr {
      border: none;
      border-top: 1px solid #222;
      width: 100%;
      max-width: 600px;
      margin-bottom: 3rem;
    }

    /* MESSAGE */
    .message {
      max-width: 600px;
      width: 100%;
      text-align: right;
      direction: rtl;
      border-right: 3px solid #f97316;
      padding-right: 1.4rem;
    }

    .message p {
      font-size: clamp(0.95rem, 2.5vw, 1.05rem);
      font-weight: 300;
      color: #ccc;
      line-height: 2;
    }

    .message strong {
      color: #fff;
      font-weight: 500;
    }

    .message .highlight {
      color: #f97316;
      font-weight: 500;
    }
  </style>
</head>
<body>

  <p class="headline">Clap Nitzan in</p>

  <div class="countdown" id="countdown">
    <div class="unit">
      <span class="digit" id="d-days">00</span>
      <span class="unit-label">Days</span>
    </div>
    <div class="colon">:</div>
    <div class="unit">
      <span class="digit" id="d-hours">00</span>
      <span class="unit-label">Hours</span>
    </div>
    <div class="colon">:</div>
    <div class="unit">
      <span class="digit" id="d-mins">00</span>
      <span class="unit-label">Minutes</span>
    </div>
    <div class="colon">:</div>
    <div class="unit">
      <span class="digit" id="d-secs">00</span>
      <span class="unit-label">Seconds</span>
    </div>
  </div>

  <p class="done" id="done-msg" style="display:none">🎉 Time to clap Nitzan!</p>

  <hr />

  <div class="message">
    <p>
      ניצן,<br>
      אתה עשית את <strong>הטעות הכי גדולה של חייך</strong>.<br>
      חשבת שאתה יכול לנצח אותי במתמטיקה בגרות?😏<br>
      אז עכשיו אני יכול לתת לך 5 כאפות. בקרוב תגיע הראשונה.<br>
      ואני מבטיח לך שזה לא יהיה נעים.<br>
      <strong>תתכונן.</strong> הספירה לאחור כבר רצה.<br>
    </p>
  </div>

  <script>
    const TARGET = new Date('2026-06-29T22:00:00');

    function pad(n) { return String(n).padStart(2, '0'); }

    function pulse(id, val) {
      const el = document.getElementById(id);
      if (el.textContent !== val) {
        el.textContent = val;
        el.classList.remove('tick');
        void el.offsetWidth;
        el.classList.add('tick');
        setTimeout(() => el.classList.remove('tick'), 300);
      }
    }

    function tick() {
      const diff = TARGET - Date.now();
      if (diff <= 0) {
        ['d-days','d-hours','d-mins','d-secs'].forEach(id => document.getElementById(id).textContent = '00');
        document.getElementById('countdown').style.opacity = '0.3';
        document.getElementById('done-msg').style.display = 'block';
        return;
      }
      const days  = Math.floor(diff / 86400000);
      const hours = Math.floor((diff % 86400000) / 3600000);
      const mins  = Math.floor((diff % 3600000) / 60000);
      const secs  = Math.floor((diff % 60000) / 1000);
      pulse('d-days',  pad(days));
      pulse('d-hours', pad(hours));
      pulse('d-mins',  pad(mins));
      pulse('d-secs',  pad(secs));
    }

    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
